[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Treat warnings as failures except the ones we know about. The
# pre-existing LSP false positives in scripts/common/* are runtime
# warnings, not pytest warnings, so this is mostly future-proofing.
filterwarnings =
    error
    # PyYAML's default Loader deprecation warning - we use safe_load,
    # but transitive imports may still trip the warning.
    ignore::DeprecationWarning:yaml

# Show local variables in tracebacks. Helps when a parametrized
# case fails -- you see WHICH input failed.
addopts = --showlocals --tb=short -ra
